      <text x="0" y="10" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-size="44" font-weight="500" letter-spacing="4" fill="url(#gold)">TONSORIUM</text>
      <line x1="-95" y1="24" x2="95" y2="24" stroke="url(#goldSoft)" stroke-width="1"/>
      <text x="0" y="46" text-anchor="middle" font-family="'Times New Roman', Georgia, serif" font-size="11" letter-spacing="8" fill="#e9dcc4" opacity="0.7">SPA · FOR · MEN</text>
      <text x="0" y="78" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-style="italic" fill="#c9a253" opacity="0.75">El arte del caballero</text>
    </g>
  </g>

  <g transform="translate(60 60)" opacity="0.7">
    <path d="M0 0 L20 0 M0 0 L0 20" stroke="url(#gold)" stroke-width="1"/>
  </g>
  <g transform="translate(740 60)" opacity="0.7">
    <path d="M0 0 L-20 0 M0 0 L0 20" stroke="url(#gold)" stroke-width="1"/>
  </g>
  <g transform="translate(60 440)" opacity="0.7">
    <path d="M0 0 L20 0 M0 0 L0 -20" stroke="url(#gold)" stroke-width="1"/>
  </g>
  <g transform="translate(740 440)" opacity="0.7">
    <path d="M0 0 L-20 0 M0 0 L0 -20" stroke="url(#gold)" stroke-width="1"/>
  </g>

  <g transform="translate(180 420)" opacity="0.75">
