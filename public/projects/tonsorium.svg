<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Tonsorium — Barbería premium">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161010"/>
      <stop offset="55%" stop-color="#1e1512"/>
      <stop offset="100%" stop-color="#0d0908"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d67a"/>
      <stop offset="50%" stop-color="#c9a253"/>
      <stop offset="100%" stop-color="#7a5a24"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a253" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a253"/>
      <stop offset="100%" stop-color="#c9a253" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f0c96b" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#f0c96b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f0c96b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="poleStripes" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9dcc4"/>
      <stop offset="16%" stop-color="#e9dcc4"/>
      <stop offset="16%" stop-color="#c94141"/>
      <stop offset="33%" stop-color="#c94141"/>
      <stop offset="33%" stop-color="#2a3d78"/>
      <stop offset="50%" stop-color="#2a3d78"/>
      <stop offset="50%" stop-color="#e9dcc4"/>
      <stop offset="66%" stop-color="#e9dcc4"/>
      <stop offset="66%" stop-color="#c94141"/>
      <stop offset="83%" stop-color="#c94141"/>
      <stop offset="83%" stop-color="#2a3d78"/>
      <stop offset="100%" stop-color="#2a3d78"/>
    </linearGradient>
    <pattern id="grain" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <circle cx="1" cy="1" r="0.35" fill="#f0c96b" fill-opacity="0.08"/>
      <circle cx="3" cy="2.4" r="0.25" fill="#f0c96b" fill-opacity="0.06"/>
    </pattern>
