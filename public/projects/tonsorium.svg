    <path d="M0 410 L800 410" stroke="url(#goldSoft)" stroke-width="1"/>
  </g>

  <g transform="translate(400 250)">
    <rect x="-155" y="-105" width="310" height="210" rx="4" ry="4" fill="none" stroke="url(#gold)" stroke-width="1.2" opacity="0.75"/>
    <rect x="-149" y="-99" width="298" height="198" rx="2" ry="2" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.4"/>

    <g transform="translate(-118 0)">
      <rect x="-14" y="-70" width="28" height="10" rx="2" fill="#2a1f14" stroke="url(#gold)" stroke-width="0.8"/>
      <rect x="-11" y="-60" width="22" height="120" fill="url(#poleStripes)"/>
      <rect x="-14" y="60" width="28" height="10" rx="2" fill="#2a1f14" stroke="url(#gold)" stroke-width="0.8"/>
      <circle cx="0" cy="-76" r="4" fill="url(#gold)"/>
      <circle cx="0" cy="76" r="4" fill="url(#gold)"/>
