      <circle cx="16" cy="0" r="7"/>
      <line x1="6" y1="-5" x2="46" y2="-24"/>
      <line x1="12" y1="-5" x2="46" y2="-22"/>
    </g>
  </g>

  <g transform="translate(600 420)" opacity="0.75">
    <path d="M0 0 h34 v-12 a10 10 0 0 1 8 4 v6 a10 10 0 0 1 -8 4 v-2 h-2 v14 h-32 z" fill="none" stroke="url(#gold)" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M8 -6 q0 -8 6 -8 M18 -6 q0 -8 6 -8 M28 -6 q0 -8 6 -8" fill="none" stroke="#c9a253" stroke-width="1" opacity="0.7"/>
  </g>

  <text x="400" y="475" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="9" letter-spacing="6" fill="#c9a253" opacity="0.55">RESERVAS · REACT · PHP · SQL SERVER</text>
